<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 160">
  <defs>
    <style>
      .box { rx: 10; ry: 10; stroke-width: 2; }
      .label { font-family: Segoe UI, Arial, sans-serif; font-size: 11px; text-anchor: middle; }
      .title { font-weight: 700; font-size: 12px; }
      .arrow { fill: none; stroke: #666; stroke-width: 2; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- Phase 1 -->
  <rect class="box" x="10" y="20" width="120" height="120" fill="#e8f5e9" stroke="#388e3c"/>
  <text class="label title" x="70" y="52" fill="#1b5e20">🔧 Phase 1</text>
  <text class="label" x="70" y="72" fill="#1b5e20">Config &amp; Load</text>
  <text class="label" x="70" y="92" fill="#1b5e20">5 TODOs</text>
  <text class="label" x="70" y="120" fill="#388e3c" font-size="9">📓 notebook</text>
  <line class="arrow" x1="130" y1="80" x2="150" y2="80"/>

  <!-- Phase 2 -->
  <rect class="box" x="155" y="20" width="120" height="120" fill="#e3f2fd" stroke="#1976d2"/>
  <text class="label title" x="215" y="52" fill="#0d47a1">🔍 Phase 2</text>
  <text class="label" x="215" y="72" fill="#0d47a1">EDA</text>
  <text class="label" x="215" y="92" fill="#0d47a1">10 TODOs</text>
  <text class="label" x="215" y="120" fill="#1976d2" font-size="9">📓 notebook</text>
  <line class="arrow" x1="275" y1="80" x2="295" y2="80"/>

  <!-- Phase 3 -->
  <rect class="box" x="300" y="20" width="120" height="120" fill="#fff3e0" stroke="#f57c00"/>
  <text class="label title" x="360" y="52" fill="#e65100">⚙️ Phase 3</text>
  <text class="label" x="360" y="72" fill="#e65100">Features &amp;</text>
  <text class="label" x="360" y="87" fill="#e65100">Preproc</text>
  <text class="label" x="360" y="107" fill="#e65100">6 TODOs</text>
  <text class="label" x="360" y="125" fill="#f57c00" font-size="9">🐍 train.py</text>
  <line class="arrow" x1="420" y1="80" x2="440" y2="80"/>

  <!-- Phase 4 -->
  <rect class="box" x="445" y="20" width="120" height="120" fill="#fce4ec" stroke="#c62828"/>
  <text class="label title" x="505" y="52" fill="#b71c1c">🤖 Phase 4</text>
  <text class="label" x="505" y="72" fill="#b71c1c">Model Training</text>
  <text class="label" x="505" y="92" fill="#b71c1c">6 TODOs</text>
  <text class="label" x="505" y="120" fill="#c62828" font-size="9">🐍 train.py</text>
  <line class="arrow" x1="565" y1="80" x2="585" y2="80"/>

  <!-- Phase 5 -->
  <rect class="box" x="590" y="20" width="120" height="120" fill="#f3e5f5" stroke="#7b1fa2"/>
  <text class="label title" x="650" y="52" fill="#4a148c">🎛️ Phase 5</text>
  <text class="label" x="650" y="72" fill="#4a148c">Hyperparameter</text>
  <text class="label" x="650" y="87" fill="#4a148c">Tuning</text>
  <text class="label" x="650" y="107" fill="#4a148c">4 TODOs</text>
  <text class="label" x="650" y="125" fill="#7b1fa2" font-size="9">🐍 train.py</text>
  <line class="arrow" x1="710" y1="80" x2="730" y2="80"/>

  <!-- Phase 6 -->
  <rect class="box" x="735" y="20" width="120" height="120" fill="#e0f7fa" stroke="#00838f"/>
  <text class="label title" x="795" y="52" fill="#006064">📊 Phase 6</text>
  <text class="label" x="795" y="72" fill="#006064">Evaluation &amp;</text>
  <text class="label" x="795" y="87" fill="#006064">Plots</text>
  <text class="label" x="795" y="107" fill="#006064">6 TODOs</text>
  <text class="label" x="795" y="125" fill="#00838f" font-size="9">🐍 train.py</text>
  <line class="arrow" x1="855" y1="80" x2="875" y2="80"/>

  <!-- Phase 7 -->
  <rect class="box" x="880" y="20" width="120" height="120" fill="#fff9c4" stroke="#f9a825"/>
  <text class="label title" x="940" y="52" fill="#f57f17">🖥️ Phase 7</text>
  <text class="label" x="940" y="72" fill="#f57f17">Gradio</text>
  <text class="label" x="940" y="87" fill="#f57f17">Dashboard</text>
  <text class="label" x="940" y="107" fill="#f57f17">6 TODOs</text>
  <text class="label" x="940" y="125" fill="#f9a825" font-size="9">🐍 app.py</text>
  <line class="arrow" x1="1000" y1="80" x2="1020" y2="80"/>

  <!-- Phase 8 -->
  <rect class="box" x="1025" y="20" width="120" height="120" fill="#efebe9" stroke="#5d4037"/>
  <text class="label title" x="1085" y="52" fill="#3e2723">📝 Phase 8</text>
  <text class="label" x="1085" y="72" fill="#3e2723">Docs &amp; Polish</text>
  <text class="label" x="1085" y="92" fill="#3e2723">4 TODOs</text>
  <text class="label" x="1085" y="120" fill="#5d4037" font-size="9">📄 README</text>
</svg>
