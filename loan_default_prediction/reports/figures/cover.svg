<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027"/>
      <stop offset="50%" style="stop-color:#203a43"/>
      <stop offset="100%" style="stop-color:#2c5364"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8"/>
      <stop offset="100%" style="stop-color:#0077b6"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f9a825"/>
      <stop offset="100%" style="stop-color:#ff8f00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" rx="16"/>

  <!-- Decorative grid lines -->
  <g opacity="0.06" stroke="#fff" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Decorative chart bars (left side) -->
  <g transform="translate(60, 100)" opacity="0.25">
    <rect x="0" y="120" width="28" height="160" rx="4" fill="url(#accent)"/>
    <rect x="40" y="80" width="28" height="200" rx="4" fill="url(#accent)"/>
    <rect x="80" y="140" width="28" height="140" rx="4" fill="url(#accent)"/>
    <rect x="120" y="60" width="28" height="220" rx="4" fill="url(#accent)"/>
    <rect x="160" y="100" width="28" height="180" rx="4" fill="url(#accent)"/>
  </g>

  <!-- ROC-like curve (right side) -->
  <g transform="translate(880, 80)" opacity="0.2">
    <rect x="0" y="0" width="260" height="240" rx="8" fill="none" stroke="#fff" stroke-width="1.5"/>
    <line x1="0" y1="240" x2="260" y2="0" stroke="#fff" stroke-width="1" stroke-dasharray="6,4"/>
    <path d="M 0 240 Q 30 60, 100 30 T 260 0" fill="none" stroke="url(#gold)" stroke-width="3"/>
    <text x="130" y="270" text-anchor="middle" fill="#ffffff80" font-family="system-ui, sans-serif" font-size="12">ROC Curve</text>
  </g>

  <!-- Decorative dots pattern -->
  <g opacity="0.08" fill="#fff">
    <circle cx="320" cy="60" r="3"/>
    <circle cx="350" cy="45" r="2"/>
    <circle cx="380" cy="70" r="2.5"/>
    <circle cx="340" cy="340" r="2"/>
    <circle cx="370" cy="355" r="3"/>
    <circle cx="310" cy="360" r="2.5"/>
  </g>

  <!-- Bank icon -->
  <g transform="translate(520, 60)">
    <rect x="0" y="30" width="160" height="8" rx="4" fill="url(#gold)" opacity="0.9"/>
    <!-- Pillars -->
    <rect x="15" y="38" width="12" height="50" rx="2" fill="#ffffff30"/>
    <rect x="45" y="38" width="12" height="50" rx="2" fill="#ffffff30"/>
    <rect x="75" y="38" width="12" height="50" rx="2" fill="#ffffff30"/>
    <rect x="105" y="38" width="12" height="50" rx="2" fill="#ffffff30"/>
    <rect x="135" y="38" width="12" height="50" rx="2" fill="#ffffff30"/>
    <!-- Roof -->
    <polygon points="80,0 170,30 -10,30" fill="url(#gold)" opacity="0.9"/>
    <!-- Base -->
    <rect x="-5" y="88" width="170" height="8" rx="3" fill="url(#gold)" opacity="0.7"/>
  </g>

  <!-- Title text -->
  <text x="600" y="210" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" letter-spacing="-1">
    Loan Default Prediction
  </text>

  <!-- Subtitle -->
  <text x="600" y="255" text-anchor="middle" fill="#90caf9" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400">
    Binary Classification · XGBoost · Gradio Dashboard
  </text>

  <!-- Tech badges row -->
  <g transform="translate(600, 290)" text-anchor="middle">
    <!-- Python badge -->
    <rect x="-275" y="0" width="100" height="28" rx="14" fill="#3776AB" opacity="0.8"/>
    <text x="-225" y="19" fill="#fff" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Python 3.14</text>

    <!-- scikit-learn badge -->
    <rect x="-160" y="0" width="105" height="28" rx="14" fill="#F7931E" opacity="0.8"/>
    <text x="-107" y="19" fill="#fff" font-family="system-ui, sans-serif" font-size="13" font-weight="500">scikit-learn</text>

    <!-- XGBoost badge -->
    <rect x="-40" y="0" width="80" height="28" rx="14" fill="#FF6600" opacity="0.8"/>
    <text x="0" y="19" fill="#fff" font-family="system-ui, sans-serif" font-size="13" font-weight="500">XGBoost</text>

    <!-- pandas badge -->
    <rect x="55" y="0" width="76" height="28" rx="14" fill="#150458" opacity="0.8"/>
    <text x="93" y="19" fill="#fff" font-family="system-ui, sans-serif" font-size="13" font-weight="500">pandas</text>

    <!-- Gradio badge -->
    <rect x="145" y="0" width="76" height="28" rx="14" fill="#F97316" opacity="0.8"/>
    <text x="183" y="19" fill="#fff" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Gradio</text>
  </g>

  <!-- Bottom line -->
  <rect x="400" y="345" width="400" height="2" rx="1" fill="url(#accent)" opacity="0.4"/>

  <!-- Author -->
  <text x="600" y="375" text-anchor="middle" fill="#ffffff60" font-family="system-ui, -apple-system, sans-serif" font-size="14">
    Vasile-Marian Danci · End-to-End ML Portfolio Project
  </text>
</svg>
